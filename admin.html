<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm to Home - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .value {
            color: #333;
            font-size: 36px;
            font-weight: bold;
        }

        .orders-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .orders-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #dee2e6;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #dee2e6;
            color: #666;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-confirmed {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-delivered {
            background: #d4edda;
            color: #155724;
        }

        .view-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .view-btn:hover {
            background: #5568d3;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            color: #999;
        }

        .order-detail {
            margin-bottom: 20px;
        }

        .order-detail h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .order-detail p {
            color: #666;
            margin: 5px 0;
        }

        .items-table {
            width: 100%;
            margin-top: 10px;
        }

        .items-table th {
            background: #f8f9fa;
            padding: 10px;
        }

        .items-table td {
            padding: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🥭 Farm to Home - Admin Dashboard</h1>
            <p>Manage your orders and view statistics</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Orders</h3>
                <div class="value" id="totalOrders">-</div>
            </div>
            <div class="stat-card">
                <h3>Total Customers</h3>
                <div class="value" id="totalCustomers">-</div>
            </div>
            <div class="stat-card">
                <h3>Total Revenue</h3>
                <div class="value" id="totalRevenue">₹0</div>
            </div>
            <div class="stat-card">
                <h3>Pending Orders</h3>
                <div class="value" id="pendingOrders">-</div>
            </div>
            <div class="stat-card">
                <h3>Contact Enquiries</h3>
                <div class="value" id="totalContacts">-</div>
            </div>
        </div>

        <div class="orders-section" style="margin-bottom: 30px;">
            <h2>Contact Enquiries</h2>
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
            <div id="contacts-table">
                <div class="loading">Loading contacts...</div>
            </div>
        </div>

        <div class="orders-section">
            <h2>Recent Orders</h2>
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
            <div id="error-message"></div>
            <div id="orders-table">
                <div class="loading">Loading orders...</div>
            </div>
        </div>
    </div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Order Details</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="orderDetails"></div>
        </div>
    </div>

    <div class="modal" id="contactModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Contact Details</h2>
                <button class="close-btn" onclick="closeContactModal()">&times;</button>
            </div>
            <div id="contactDetails"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5001';

        async function loadData() {
            try {
                // Load statistics
                const statsResponse = await fetch(`${API_URL}/api/statistics`);
                const statsData = await statsResponse.json();
                
                if (statsData.success) {
                    document.getElementById('totalOrders').textContent = statsData.statistics.total_orders;
                    document.getElementById('totalCustomers').textContent = statsData.statistics.total_customers;
                    document.getElementById('totalRevenue').textContent = `₹${statsData.statistics.total_revenue.toLocaleString('en-IN')}`;
                    document.getElementById('pendingOrders').textContent = statsData.statistics.orders_by_status.pending || 0;
                    document.getElementById('totalContacts').textContent = statsData.statistics.total_contacts || 0;
                }

                // Load contacts
                const contactsResponse = await fetch(`${API_URL}/api/contacts`);
                const contactsData = await contactsResponse.json();
                
                if (contactsData.success) {
                    displayContacts(contactsData.contacts);
                }

                // Load orders
                const ordersResponse = await fetch(`${API_URL}/api/orders`);
                const ordersData = await ordersResponse.json();
                
                if (ordersData.success) {
                    displayOrders(ordersData.orders);
                }
            } catch (error) {
                document.getElementById('error-message').innerHTML = `
                    <div class="error">
                        ⚠️ Error loading data: ${error.message}<br>
                        Make sure the backend server is running on port 5001.
                    </div>
                `;
            }
        }

        function displayContacts(contacts) {
            if (contacts.length === 0) {
                document.getElementById('contacts-table').innerHTML = '<p style="text-align: center; padding: 20px; color: #666;">No contact enquiries yet.</p>';
                return;
            }

            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${contacts.map(contact => `
                            <tr>
                                <td><strong>#${contact.id}</strong></td>
                                <td>${contact.name}</td>
                                <td>${contact.email}</td>
                                <td>${contact.phone || 'N/A'}</td>
                                <td><span class="status-badge status-${contact.status}">${contact.status}</span></td>
                                <td>${new Date(contact.created_at).toLocaleDateString('en-IN')}</td>
                                <td><button class="view-btn" onclick="viewContact(${contact.id}, '${contact.name.replace(/'/g, "\\'")}', '${contact.email}', '${contact.phone || ''}', '${contact.message.replace(/'/g, "\\'").replace(/\n/g, ' ')}', '${contact.created_at}')">View</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('contacts-table').innerHTML = tableHTML;
        }

        function viewContact(id, name, email, phone, message, createdAt) {
            const detailsHTML = `
                <div class="order-detail">
                    <h3>Contact Information</h3>
                    <p><strong>ID:</strong> #${id}</p>
                    <p><strong>Date:</strong> ${new Date(createdAt).toLocaleString('en-IN')}</p>
                </div>

                <div class="order-detail">
                    <h3>Customer Details</h3>
                    <p><strong>Name:</strong> ${name}</p>
                    <p><strong>Email:</strong> <a href="mailto:${email}">${email}</a></p>
                    <p><strong>Phone:</strong> ${phone || 'Not provided'}</p>
                </div>

                <div class="order-detail">
                    <h3>Message</h3>
                    <p style="background: #f8f9fa; padding: 15px; border-radius: 8px; line-height: 1.6;">${message}</p>
                </div>

                <div class="order-detail">
                    <h3>Actions</h3>
                    <button class="view-btn" onclick="window.location.href='mailto:${email}'">📧 Reply via Email</button>
                    <button class="view-btn" style="background: #28a745; margin-left: 10px;" onclick="window.open('https://wa.me/${phone.replace(/\D/g, '')}', '_blank')">💬 WhatsApp</button>
                </div>
            `;
            
            document.getElementById('contactDetails').innerHTML = detailsHTML;
            document.getElementById('contactModal').classList.add('show');
        }

        function closeContactModal() {
            document.getElementById('contactModal').classList.remove('show');
        }

        function displayOrders(orders) {
            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Order #</th>
                            <th>Customer</th>
                            <th>Phone</th>
                            <th>Total</th>
                            <th>Payment</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${orders.map(order => `
                            <tr>
                                <td><strong>${order.order_number}</strong></td>
                                <td>${order.customer_name}</td>
                                <td>${order.customer_phone}</td>
                                <td><strong>₹${order.total_amount.toLocaleString('en-IN')}</strong></td>
                                <td>${order.payment_method.toUpperCase()}</td>
                                <td><span class="status-badge status-${order.order_status}">${order.order_status}</span></td>
                                <td>${new Date(order.created_at).toLocaleDateString('en-IN')}</td>
                                <td><button class="view-btn" onclick="viewOrder(${order.id})">View</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('orders-table').innerHTML = tableHTML;
        }

        async function viewOrder(orderId) {
            try {
                const response = await fetch(`${API_URL}/api/orders/${orderId}`);
                const data = await response.json();
                
                if (data.success) {
                    const order = data.order;
                    const detailsHTML = `
                        <div class="order-detail">
                            <h3>Order Information</h3>
                            <p><strong>Order Number:</strong> ${order.order_number}</p>
                            <p><strong>Status:</strong> <span class="status-badge status-${order.order_status}">${order.order_status}</span></p>
                            <p><strong>Order Date:</strong> ${new Date(order.created_at).toLocaleString('en-IN')}</p>
                        </div>

                        <div class="order-detail">
                            <h3>Customer Details</h3>
                            <p><strong>Name:</strong> ${order.customer_name}</p>
                            <p><strong>Email:</strong> ${order.customer_email}</p>
                            <p><strong>Phone:</strong> ${order.customer_phone}</p>
                            <p><strong>Address:</strong> ${order.address}, ${order.city} - ${order.pincode}</p>
                        </div>

                        <div class="order-detail">
                            <h3>Order Items</h3>
                            <table class="items-table">
                                <thead>
                                    <tr>
                                        <th>Item</th>
                                        <th>Qty</th>
                                        <th>Price</th>
                                        <th>Subtotal</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${order.items.map(item => `
                                        <tr>
                                            <td>${item.item_name}</td>
                                            <td>${item.quantity}</td>
                                            <td>₹${item.price.toLocaleString('en-IN')}</td>
                                            <td>₹${item.subtotal.toLocaleString('en-IN')}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>

                        <div class="order-detail">
                            <h3>Payment Information</h3>
                            <p><strong>Payment Method:</strong> ${order.payment_method.toUpperCase()}</p>
                            <p><strong>Total Amount:</strong> <strong style="font-size: 24px; color: #667eea;">₹${order.total_amount.toLocaleString('en-IN')}</strong></p>
                            ${order.upi_id ? `<p><strong>UPI ID:</strong> <code style="background: #f8f9fa; padding: 5px 10px; border-radius: 5px;">${order.upi_id}</code></p>` : ''}
                            ${order.razorpay_order_id ? `<p><strong>Razorpay Order ID:</strong> <code style="background: #f8f9fa; padding: 5px 10px; border-radius: 5px; font-size: 12px;">${order.razorpay_order_id}</code></p>` : ''}
                            ${order.razorpay_payment_id ? `<p><strong>Razorpay Payment ID:</strong> <code style="background: #f8f9fa; padding: 5px 10px; border-radius: 5px; font-size: 12px;">${order.razorpay_payment_id}</code></p>` : ''}
                        </div>
                    `;
                    
                    document.getElementById('orderDetails').innerHTML = detailsHTML;
                    document.getElementById('orderModal').classList.add('show');
                }
            } catch (error) {
                alert('Error loading order details: ' + error.message);
            }
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('show');
        }

        // Load data on page load
        loadData();

        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
