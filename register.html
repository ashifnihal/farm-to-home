<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Farm to Home</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .auth-header p {
            color: #666;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-register {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🥭 Create Account</h1>
                <p>Join Farm to Home</p>
            </div>

            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="10-digit mobile number" pattern="[0-9]{10}">
                </div>

                <div class="form-group">
                    <label for="address">Address *</label>
                    <input type="text" id="address" name="address" required placeholder="Street address, building name">
                </div>

                <div class="form-group">
                    <label for="city">City *</label>
                    <input type="text" id="city" name="city" required placeholder="Bangalore" value="Bangalore" readonly style="background-color: #f0f0f0; cursor: not-allowed;">
                    <small style="color: #667eea; font-size: 12px; margin-top: 5px; display: block;">Currently, we only deliver to Bangalore</small>
                </div>

                <div class="form-group">
                    <label for="pincode">Pincode *</label>
                    <input type="text" id="pincode" name="pincode" required placeholder="Enter 6-digit pincode" pattern="[0-9]{6}" maxlength="6">
                    <small id="pincodeHelp" style="color: #667eea; font-size: 12px; margin-top: 5px; display: block;">Bangalore Urban pincodes only (560001-560103)</small>
                    <small id="pincodeError" style="color: #f44336; font-size: 12px; margin-top: 5px; display: none;"></small>
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required placeholder="Minimum 6 characters" minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Re-enter password">
                </div>

                <button type="submit" class="btn-register" id="registerBtn">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
                <br><br>
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5001';

        // Valid Bangalore Urban pincodes
        const validBangalorePincodes = [
            '560001', '560002', '560003', '560004', '560005', '560006', '560007', '560008', '560009', '560010',
            '560011', '560012', '560013', '560014', '560015', '560016', '560017', '560018', '560019', '560020',
            '560021', '560022', '560023', '560024', '560025', '560026', '560027', '560028', '560029', '560030',
            '560031', '560032', '560033', '560034', '560035', '560036', '560037', '560038', '560039', '560040',
            '560041', '560042', '560043', '560044', '560045', '560046', '560047', '560048', '560049', '560050',
            '560051', '560052', '560053', '560054', '560055', '560056', '560057', '560058', '560059', '560060',
            '560061', '560062', '560063', '560064', '560065', '560066', '560067', '560068', '560069', '560070',
            '560071', '560072', '560073', '560074', '560075', '560076', '560077', '560078', '560079', '560080',
            '560081', '560082', '560083', '560084', '560085', '560086', '560087', '560088', '560089', '560090',
            '560091', '560092', '560093', '560094', '560095', '560096', '560097', '560098', '560099', '560100',
            '560103'
        ];

        // Real-time pincode validation
        document.getElementById('pincode').addEventListener('input', function(e) {
            const pincode = e.target.value;
            const pincodeError = document.getElementById('pincodeError');
            const pincodeHelp = document.getElementById('pincodeHelp');
            
            if (pincode.length === 6) {
                if (validBangalorePincodes.includes(pincode)) {
                    // Valid pincode
                    e.target.style.borderColor = '#4CAF50';
                    pincodeError.style.display = 'none';
                    pincodeHelp.style.display = 'block';
                    pincodeHelp.textContent = '✓ Valid Bangalore Urban pincode';
                    pincodeHelp.style.color = '#4CAF50';
                } else {
                    // Invalid pincode
                    e.target.style.borderColor = '#f44336';
                    pincodeHelp.style.display = 'none';
                    pincodeError.style.display = 'block';
                    pincodeError.textContent = '✗ Invalid pincode. We only deliver to Bangalore Urban (560001-560103)';
                }
            } else {
                // Reset to default
                e.target.style.borderColor = '#e0e0e0';
                pincodeError.style.display = 'none';
                pincodeHelp.style.display = 'block';
                pincodeHelp.textContent = 'Bangalore Urban pincodes only (560001-560103)';
                pincodeHelp.style.color = '#667eea';
            }
        });

        async function handleRegister(event) {
            event.preventDefault();

            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            const registerBtn = document.getElementById('registerBtn');

            // Hide previous messages
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Get form data
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const city = document.getElementById('city').value;
            const pincode = document.getElementById('pincode').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate passwords match
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match!';
                errorDiv.style.display = 'block';
                return;
            }

            // Validate Bangalore Urban pincode
            const validBangalorePincodes = [
                '560001', '560002', '560003', '560004', '560005', '560006', '560007', '560008', '560009', '560010',
                '560011', '560012', '560013', '560014', '560015', '560016', '560017', '560018', '560019', '560020',
                '560021', '560022', '560023', '560024', '560025', '560026', '560027', '560028', '560029', '560030',
                '560031', '560032', '560033', '560034', '560035', '560036', '560037', '560038', '560039', '560040',
                '560041', '560042', '560043', '560044', '560045', '560046', '560047', '560048', '560049', '560050',
                '560051', '560052', '560053', '560054', '560055', '560056', '560057', '560058', '560059', '560060',
                '560061', '560062', '560063', '560064', '560065', '560066', '560067', '560068', '560069', '560070',
                '560071', '560072', '560073', '560074', '560075', '560076', '560077', '560078', '560079', '560080',
                '560081', '560082', '560083', '560084', '560085', '560086', '560087', '560088', '560089', '560090',
                '560091', '560092', '560093', '560094', '560095', '560096', '560097', '560098', '560099', '560100',
                '560103'
            ];

            if (!validBangalorePincodes.includes(pincode)) {
                errorDiv.textContent = 'Sorry! We currently deliver only to Bangalore Urban areas. Please enter a valid Bangalore Urban pincode.';
                errorDiv.style.display = 'block';
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
                return;
            }

            // Disable button
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating Account...';

            try {
                const response = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        phone,
                        address,
                        city,
                        pincode,
                        password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    successDiv.textContent = 'Account created successfully! Redirecting to login...';
                    successDiv.style.display = 'block';
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorDiv.textContent = data.message || 'Registration failed. Please try again.';
                    errorDiv.style.display = 'block';
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Create Account';
                }
            } catch (error) {
                errorDiv.textContent = 'Error connecting to server. Please try again.';
                errorDiv.style.display = 'block';
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        }
    </script>
</body>
</html>
