<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - Farm to Home</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .dashboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info h1 {
            margin: 0 0 10px 0;
            font-size: 32px;
        }

        .user-info p {
            margin: 0;
            opacity: 0.9;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: white;
            color: #667eea;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .value {
            color: #333;
            font-size: 36px;
            font-weight: bold;
        }

        .orders-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            color: #333;
            font-size: 24px;
            margin: 0;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .order-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .order-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .order-number {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .order-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-placed {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-confirmed {
            background: #fff3cd;
            color: #856404;
        }

        .status-delivered {
            background: #d4edda;
            color: #155724;
        }

        .order-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .order-detail-item {
            color: #666;
        }

        .order-detail-item strong {
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .order-items {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .order-items h4 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .shop-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="user-info">
                <h1>Welcome, <span id="userName">User</span>! 🥭</h1>
                <p id="userEmail">user@email.com</p>
            </div>
            <div>
                <a href="index.html" class="logout-btn" style="background: rgba(76, 175, 80, 0.3); border-color: #4CAF50; margin-right: 10px; text-decoration: none; display: inline-block;">🏠 Home</a>
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Orders</h3>
                <div class="value" id="totalOrders">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Spent</h3>
                <div class="value" id="totalSpent">₹0</div>
            </div>
            <div class="stat-card">
                <h3>Pending Orders</h3>
                <div class="value" id="pendingOrders">0</div>
            </div>
        </div>

        <div class="orders-section">
            <div class="section-header">
                <h2>My Orders</h2>
                <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh</button>
            </div>
            <div id="ordersContainer">
                <div class="loading">Loading your orders...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5001';
        let currentUser = null;

        // Check if user is logged in
        function checkAuth() {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'login.html';
                return null;
            }
            return JSON.parse(userStr);
        }

        // Load user info
        function loadUserInfo() {
            currentUser = checkAuth();
            if (currentUser) {
                document.getElementById('userName').textContent = currentUser.name;
                document.getElementById('userEmail').textContent = currentUser.email;
            }
        }

        // Load orders
        async function loadOrders() {
            if (!currentUser) return;

            try {
                const response = await fetch(`${API_URL}/api/customer/${currentUser.email}/orders`);
                const data = await response.json();

                if (data.success) {
                    displayOrders(data.orders);
                    updateStats(data.orders);
                } else {
                    document.getElementById('ordersContainer').innerHTML = `
                        <div class="empty-state">
                            <h3>Error loading orders</h3>
                            <p>${data.message}</p>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('ordersContainer').innerHTML = `
                    <div class="empty-state">
                        <h3>Error connecting to server</h3>
                        <p>Please try again later</p>
                    </div>
                `;
            }
        }

        // Display orders
        function displayOrders(orders) {
            const container = document.getElementById('ordersContainer');

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No orders yet</h3>
                        <p>Start shopping to see your orders here!</p>
                        <a href="shop.html" class="shop-btn">Shop Now</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-number">#${order.order_number}</div>
                        <div class="order-status status-${order.order_status}">${order.order_status}</div>
                    </div>
                    <div class="order-details">
                        <div class="order-detail-item">
                            <strong>Order Date</strong>
                            ${new Date(order.order_date).toLocaleDateString('en-IN', { 
                                day: 'numeric', 
                                month: 'long', 
                                year: 'numeric' 
                            })}
                        </div>
                        <div class="order-detail-item">
                            <strong>Total Amount</strong>
                            ₹${order.total_amount.toLocaleString('en-IN')}
                        </div>
                        <div class="order-detail-item">
                            <strong>Payment Method</strong>
                            ${order.payment_method.toUpperCase()}
                        </div>
                    </div>
                    <button class="refresh-btn" onclick="viewOrderDetails(${order.id})">View Details</button>
                </div>
            `).join('');
        }

        // Update stats
        function updateStats(orders) {
            const totalOrders = orders.length;
            const totalSpent = orders.reduce((sum, order) => sum + order.total_amount, 0);
            const pendingOrders = orders.filter(order => order.order_status === 'placed' || order.order_status === 'pending').length;

            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('totalSpent').textContent = `₹${totalSpent.toLocaleString('en-IN')}`;
            document.getElementById('pendingOrders').textContent = pendingOrders;
        }

        // View order details
        async function viewOrderDetails(orderId) {
            try {
                const response = await fetch(`${API_URL}/api/orders/${orderId}`);
                const data = await response.json();

                if (data.success) {
                    const order = data.order;
                    alert(`Order Details:\n\nOrder Number: ${order.order_number}\nStatus: ${order.order_status}\nTotal: ₹${order.total_amount}\n\nItems:\n${order.items.map(item => `- ${item.item_name} x ${item.quantity} = ₹${item.subtotal}`).join('\n')}`);
                }
            } catch (error) {
                alert('Error loading order details');
            }
        }

        // Logout
        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        }

        // Initialize
        loadUserInfo();
        loadOrders();
    </script>
</body>
</html>
